<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRAN STOREML | STABLE PROTOCOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #0ea5e9; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); color: #e2e8f0; font-family: sans-serif; overflow-x: hidden; }
        .font-gaming { font-family: 'Rajdhani', sans-serif; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }

        /* PERBAIKAN KLIK: Ukuran Tetap & Tanpa Pergeseran Layout */
        .product-card { 
            cursor: pointer; 
            transition: border-color 0.2s, background 0.2s; 
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            background: rgba(15, 23, 42, 0.6);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Hanya ganti warna, jangan ganti ukuran (scale) agar tidak menggeser tetangga */
        .product-card:active { background: rgba(14, 165, 233, 0.3); }
        
        .product-card.active {
            border: 2px solid var(--neon) !important;
            background: rgba(14, 165, 233, 0.2);
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.2);
        }

        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-protocol { background: linear-gradient(135deg, #0ea5e9, #a855f7); transition: 0.3s; }
        #particles-js { position: fixed; inset: 0; z-index: -1; }
    </style>
</head>
<body class="pb-20">

    <div id="particles-js"></div>

    <header class="pt-12 pb-8 text-center relative z-10">
        <h1 class="font-cyber text-3xl md:text-5xl font-bold text-white tracking-tighter">MIRAN STOREML</h1>
        <p class="mt-2 text-sky-400 font-gaming tracking-[0.3em] text-[10px] uppercase font-bold opacity-80">Stable Payment Gateway</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-6 relative z-10">
        
        <div class="lg:col-span-4">
            <div class="glass-card p-6 rounded-2xl sticky top-5">
                <h2 class="font-gaming text-white font-bold tracking-widest mb-6">IDENTITAS TARGET</h2>
                <div class="space-y-4">
                    <input type="number" id="user_id" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-sky-500" placeholder="User ID">
                    <input type="number" id="zone_id" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-sky-500" placeholder="Zone ID">
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="glass-card p-6 rounded-2xl">
                <h2 class="font-gaming text-white font-bold tracking-widest mb-6 italic">PILIH NOMINAL_</h2>
                
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3" id="item-grid"></div>

                <button onclick="initCheckout()" class="w-full mt-8 py-4 btn-protocol rounded-xl text-black font-black font-cyber text-xs tracking-widest uppercase shadow-lg shadow-sky-500/20">
                    Beli Sekarang
                </button>
            </div>
        </div>
    </main>

    <div id="payModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm rounded-3xl p-8 border border-white/10 shadow-2xl">
            <div class="text-center mb-6">
                <h3 id="inv-total" class="text-4xl font-cyber font-bold text-white tracking-tighter">Rp 0</h3>
                <p class="text-[10px] text-slate-500 mt-2 font-bold tracking-widest uppercase">Total Bayar (+PPN 11%)</p>
            </div>

            <div class="space-y-3 mb-6 text-xs bg-white/5 p-4 rounded-xl border border-white/5">
                <div class="flex justify-between"><span>Produk:</span><span id="inv-item" class="text-white font-bold"></span></div>
                <div class="flex justify-between"><span>Tujuan:</span><span id="inv-uid" class="text-sky-400 font-bold"></span></div>
            </div>

            <div class="bg-blue-600 rounded-xl p-4 mb-6">
                <p class="text-[8px] text-white/70 font-bold uppercase mb-1">DANA (SYA***)</p>
                <div class="flex justify-between items-center">
                    <span class="text-xl font-cyber font-bold text-white tracking-wider">083112056537</span>
                    <button onclick="copyDana()" class="bg-white/20 p-2 rounded-lg hover:bg-white/40 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>
                    </button>
                </div>
            </div>

            <button onclick="finalizeTransaction()" class="w-full py-4 bg-white text-black font-black font-cyber rounded-xl text-[10px] tracking-widest active:scale-95 transition">Konfirmasi via WA</button>
            <button onclick="closeModal()" class="w-full mt-4 text-[9px] text-slate-500 font-bold uppercase tracking-widest">Batal</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const WA_ADMIN = "6283822691748";
        const DANA_NUM = "083112056537";
        const PPN_RATE = 0.11;

        const products = [
            { name: "5 Diamonds", base: 1800 },
            { name: "12 Diamonds", base: 3600 },
            { name: "19 Diamonds", base: 5400 },
            { name: "28 Diamonds", base: 8100 },
            { name: "44 Diamonds", base: 12600 },
            { name: "59 Diamonds", base: 16200 },
            { name: "85 Diamonds", base: 22500 },
            { name: "170 Diamonds", base: 44100 },
            { name: "250 Diamonds", base: 65000 },
            { name: "296 Diamonds", base: 76500 },
            { name: "408 Diamonds", base: 106300 },
            { name: "514 Diamonds", base: 130000 },
            { name: "568 Diamonds", base: 144100 },
            { name: "706 Diamonds", base: 181000 },
            { name: "875 Diamonds", base: 220700 },
            { name: "Weekly Pass", base: 27000, type: 'wdp' }
        ];

        let selected = null;
        function formatIDR(n) { return "Rp " + Math.round(n).toLocaleString('id-ID'); }

        const grid = document.getElementById('item-grid');
        products.forEach(p => {
            const div = document.createElement('div');
            // Ukuran dibuat statis dan padding ditambah agar area klik luas tapi tidak menggeser yang lain
            div.className = "p-4 rounded-xl product-card text-center flex flex-col items-center justify-center min-h-[85px]";
            div.innerHTML = `
                <div class="text-[10px] font-black ${p.type === 'wdp' ? 'text-yellow-400' : 'text-sky-400'} font-cyber uppercase tracking-tighter">${p.name}</div>
                <div class="text-[9px] text-white/40 font-bold mt-1">${formatIDR(p.base)}</div>
            `;
            div.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.product-card').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                selected = p;
            });
            grid.appendChild(div);
        });

        function initCheckout() {
            const uid = document.getElementById('user_id').value;
            const zid = document.getElementById('zone_id').value;
            if(!uid || !zid || !selected) return alert("Lengkapi data!");
            
            const tax = selected.base * PPN_RATE;
            const total = selected.base + tax;

            document.getElementById('inv-uid').innerText = uid + " (" + zid + ")";
            document.getElementById('inv-item').innerText = selected.name;
            document.getElementById('inv-total').innerText = formatIDR(total);
            document.getElementById('payModal').style.display = 'flex';
        }

        function finalizeTransaction() {
            const total = document.getElementById('inv-total').innerText;
            const msg = `*ORDER MIRAN STOREML*\nTarget: ${document.getElementById('inv-uid').innerText}\nItem: ${selected.name}\nTotal(+PPN): ${total}\nStatus: Menunggu Konfirmasi`;
            window.location.href = `https://wa.me/${WA_ADMIN}?text=${encodeURIComponent(msg)}`;
        }

        function copyDana() { navigator.clipboard.writeText(DANA_NUM); alert("DANA Disalin!"); }
        function closeModal() { document.getElementById('payModal').style.display = 'none'; }

        particlesJS("particles-js", {
            particles: {
                number: { value: 30 },
                color: { value: "#0ea5e9" },
                opacity: { value: 0.1 },
                size: { value: 2 },
                line_linked: { enable: false },
                move: { enable: true, speed: 0.5 }
            }
        });
    </script>
</body>
</html>
