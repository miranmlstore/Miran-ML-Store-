<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIRAN STOREML | INTERACTIVE V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #0ea5e9; --bg-dark: #020617; }
        body { 
            background-color: var(--bg-dark); 
            color: #e2e8f0; 
            font-family: sans-serif; 
            overflow-x: hidden;
            touch-action: pan-x pan-y;
        }
        .font-gaming { font-family: 'Rajdhani', sans-serif; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }

        /* MENCEGAH PERGESERAN KLIK */
        .product-card { 
            cursor: pointer; 
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            background: rgba(15, 23, 42, 0.6);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .product-card.active {
            border: 2px solid var(--neon) !important;
            background: rgba(14, 165, 233, 0.2);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
        }

        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-protocol { background: linear-gradient(135deg, #0ea5e9, #a855f7); transition: 0.3s; position: relative; overflow: hidden; }
        
        #particles-js { position: fixed; inset: 0; z-index: -1; }

        /* ANIMASI SALIN BARU */
        .copy-success { color: #4ade80 !important; text-shadow: 0 0 10px #4ade80; }
        
        #copy-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(74, 222, 128, 0.9);
            color: #000;
            padding: 10px 25px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 11px;
            letter-spacing: 1px;
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #copy-toast.show { transform: translateX(-50%) translateY(0); }

        /* INPUT GLOW */
        input:focus { box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); border-color: var(--neon) !important; }
    </style>
</head>
<body class="pb-20">

    <div id="particles-js"></div>
    <div id="copy-toast">PROTOCOL: NOMOR DISALIN</div>

    <header class="pt-16 pb-8 text-center relative z-10">
        <h1 id="hacker-title" class="font-cyber text-3xl md:text-5xl font-bold text-white tracking-tighter" data-value="MIRAN STOREML">MIRAN STOREML</h1>
        <p class="mt-2 text-sky-400 font-gaming tracking-[0.4em] text-[10px] uppercase font-bold opacity-80">Syncing with Mainframe...</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-6 relative z-10">
        <div class="lg:col-span-4">
            <div class="glass-card p-6 rounded-3xl sticky top-5">
                <h2 class="font-gaming text-white font-bold tracking-widest mb-6 border-l-4 border-sky-500 pl-3">TARGET UNIT</h2>
                <div class="space-y-4">
                    <input type="number" id="user_id" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-white outline-none transition-all" placeholder="Enter User ID">
                    <input type="number" id="zone_id" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-white outline-none transition-all" placeholder="Zone ID">
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="glass-card p-6 rounded-3xl">
                <h2 class="font-gaming text-white font-bold tracking-widest mb-6 italic">SELECT ASSET_</h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3" id="item-grid"></div>
                <button onclick="initCheckout()" class="w-full mt-8 py-5 btn-protocol rounded-2xl text-black font-black font-cyber text-xs tracking-widest uppercase active:scale-95">
                    EXECUTE TRANSACTION
                </button>
            </div>
        </div>
    </main>

    <div id="payModal" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] hidden items-center justify-center p-4">
        <div class="glass-card w-full max-w-sm rounded-[2rem] p-8 border border-white/10 shadow-2xl overflow-hidden relative">
            <div class="text-center mb-8">
                <h3 id="inv-total" class="text-4xl font-cyber font-bold text-white tracking-tighter">Rp 0</h3>
                <p class="text-[9px] text-slate-500 mt-2 font-bold tracking-[0.2em] uppercase">Secured Payment Total</p>
            </div>

            <div class="space-y-3 mb-6 text-xs bg-white/5 p-5 rounded-2xl border border-white/5">
                <div class="flex justify-between"><span class="text-slate-400">Asset:</span><span id="inv-item" class="text-white font-bold uppercase"></span></div>
                <div class="flex justify-between"><span class="text-slate-400">Unit ID:</span><span id="inv-uid" class="text-sky-400 font-bold"></span></div>
            </div>

            <div class="bg-blue-600 rounded-2xl p-5 mb-8 relative group">
                <p class="text-[8px] text-white/70 font-bold uppercase mb-2 tracking-widest">DANA GATEWAY</p>
                <div class="flex justify-between items-center">
                    <span id="dana-number" class="text-xl font-cyber font-bold text-white tracking-widest transition-all duration-300">083112056537</span>
                    <button id="btn-copy" onclick="copyDana()" class="bg-white/20 p-2.5 rounded-xl hover:bg-white/40 transition active:scale-75">
                        <svg id="copy-svg" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path id="svg-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                        </svg>
                    </button>
                </div>
                <p class="text-[9px] text-white/60 mt-2 font-bold uppercase">A/N: SYA***</p>
            </div>

            <button onclick="finalizeTransaction()" class="w-full py-4 bg-white text-black font-black font-cyber rounded-xl text-[10px] tracking-widest hover:bg-sky-400 transition-all uppercase">Confirm via Mainframe</button>
            <button onclick="closeModal()" class="w-full mt-5 text-[9px] text-slate-500 font-bold uppercase tracking-widest hover:text-white transition">Abort Process</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const WA_ADMIN = "6283822691748";
        const DANA_NUM = "083112056537";
        const PPN_RATE = 0.11;

        // Hacker Text Effect
        const title = document.getElementById("hacker-title");
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let interval = null;
        function solveTitle() {
            let iteration = 0;
            clearInterval(interval);
            interval = setInterval(() => {
                title.innerText = title.innerText.split("").map((letter, index) => {
                    if(index < iteration) return title.dataset.value[index];
                    return letters[Math.floor(Math.random() * 26)];
                }).join("");
                if(iteration >= title.dataset.value.length) clearInterval(interval);
                iteration += 1 / 3;
            }, 30);
        }
        window.onload = solveTitle;

        // Render Diamonds
        const products = [
            { name: "5 Diamonds", base: 1800 },
            { name: "12 Diamonds", base: 3600 },
            { name: "19 Diamonds", base: 5400 },
            { name: "28 Diamonds", base: 8100 },
            { name: "44 Diamonds", base: 12600 },
            { name: "59 Diamonds", base: 16200 },
            { name: "85 Diamonds", base: 22500 },
            { name: "170 Diamonds", base: 44100 },
            { name: "250 Diamonds", base: 65000 },
            { name: "296 Diamonds", base: 76500 },
            { name: "408 Diamonds", base: 106300 },
            { name: "Weekly Pass", base: 27000, type: 'wdp' }
        ];

        let selected = null;
        const grid = document.getElementById('item-grid');
        products.forEach(p => {
            const div = document.createElement('div');
            div.className = "p-4 rounded-xl product-card text-center flex flex-col items-center justify-center min-h-[85px]";
            div.innerHTML = `<div class="text-[10px] font-black ${p.type === 'wdp' ? 'text-yellow-400' : 'text-sky-400'} font-cyber uppercase">${p.name}</div>
                             <div class="text-[9px] text-white/40 font-bold mt-1">Rp ${Math.round(p.base).toLocaleString('id-ID')}</div>`;
            div.onclick = () => {
                document.querySelectorAll('.product-card').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                selected = p;
            };
            grid.appendChild(div);
        });

        // Advanced Copy Animation
        function copyDana() {
            navigator.clipboard.writeText(DANA_NUM);
            const numEl = document.getElementById('dana-number');
            const svgPath = document.getElementById('svg-path');
            const toast = document.getElementById('copy-toast');

            numEl.classList.add('copy-success');
            // Ganti icon ke Checkmark
            svgPath.setAttribute('d', 'M5 13l4 4L19 7');
            toast.classList.add('show');

            setTimeout(() => {
                numEl.classList.remove('copy-success');
                svgPath.setAttribute('d', 'M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2');
                toast.classList.remove('show');
            }, 2000);
        }

        function initCheckout() {
            const uid = document.getElementById('user_id').value;
            const zid = document.getElementById('zone_id').value;
            if(!uid || !zid || !selected) return alert("ACCESS DENIED: DATA INCOMPLETE");
            const tax = selected.base * PPN_RATE;
            document.getElementById('inv-uid').innerText = uid + " (" + zid + ")";
            document.getElementById('inv-item').innerText = selected.name;
            document.getElementById('inv-total').innerText = "Rp " + Math.round(selected.base + tax).toLocaleString('id-ID');
            document.getElementById('payModal').style.display = 'flex';
        }

        function finalizeTransaction() {
            const msg = `*ORDER MIRAN STOREML*\nTarget: ${document.getElementById('inv-uid').innerText}\nItem: ${selected.name}\nTotal: ${document.getElementById('inv-total').innerText}\n\nProtocol: Secured via DANA`;
            window.location.href = `https://wa.me/${WA_ADMIN}?text=${encodeURIComponent(msg)}`;
        }

        function closeModal() { document.getElementById('payModal').style.display = 'none'; }

        // Interactive Particles
        particlesJS("particles-js", {
            particles: {
                number: { value: 50 },
                color: { value: "#0ea5e9" },
                shape: { type: "circle" },
                opacity: { value: 0.2 },
                size: { value: 2 },
                line_linked: { enable: true, distance: 150, color: "#0ea5e9", opacity: 0.1, width: 1 },
                move: { enable: true, speed: 1 }
            },
            interactivity: {
                detect_on: "canvas",
                events: { onhover: { enable: true, mode: "repulse" }, onclick: { enable: true, mode: "push" } }
            }
        });
    </script>
</body>
</html>
