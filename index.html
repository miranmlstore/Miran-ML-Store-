<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRAN STOREML | EXPANDED PROTOCOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #0ea5e9;
            --bg-dark: #020617;
        }

        body {
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* SCANLINE EFFECT */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .font-gaming { font-family: 'Rajdhani', sans-serif; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: 0.3s ease;
        }

        /* CARD SELECTION */
        .product-card { cursor: pointer; position: relative; overflow: hidden; }
        .product-card:hover { border-color: var(--neon); background: rgba(14, 165, 233, 0.05); transform: translateY(-3px); }
        .product-card.active {
            border: 2px solid var(--neon);
            background: rgba(14, 165, 233, 0.15);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
        }

        .status-bar { height: 2px; background: linear-gradient(90deg, transparent, var(--neon), transparent); animation: slide 2s infinite linear; }
        @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .btn-protocol {
            background: linear-gradient(135deg, #0ea5e9, #a855f7);
            transition: 0.3s;
        }
        .btn-protocol:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(14, 165, 233, 0.5); }

        #particles-js { position: fixed; inset: 0; z-index: -1; }
        
        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon); }
    </style>
</head>
<body class="pb-20">

    <div id="particles-js"></div>

    <header class="pt-16 pb-8 text-center relative z-10">
        <h1 class="font-cyber text-4xl md:text-6xl font-bold tracking-tighter text-white">MIRAN STOREML</h1>
        <div class="status-bar max-w-xs mx-auto mt-2"></div>
        <p class="mt-4 text-sky-400 font-gaming tracking-[0.4em] text-[10px] uppercase font-bold opacity-80">Premium Asset Injection System</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-10 relative z-10">
        
        <div class="lg:col-span-4">
            <div class="glass-card p-8 rounded-3xl sticky top-10">
                <h2 class="font-gaming text-lg text-white font-bold tracking-widest mb-8 flex items-center gap-2">
                    <span class="w-2 h-2 bg-sky-500 rounded-full animate-ping"></span>
                    VERIFY TARGET
                </h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-2 block">User ID</label>
                        <input type="number" id="user_id" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-white font-bold focus:border-sky-500 transition-all outline-none" placeholder="12345678">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-2 block">Zone ID</label>
                        <input type="number" id="zone_id" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-white font-bold focus:border-sky-500 transition-all outline-none" placeholder="1234">
                    </div>
                </div>

                <div class="mt-10 p-4 bg-sky-500/5 rounded-2xl border border-sky-500/10">
                    <p class="text-[9px] text-slate-400 italic">Sistem otomatis menghitung PPN 11% saat konfirmasi pesanan.</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="glass-card p-8 rounded-3xl">
                <h2 class="font-gaming text-lg text-white font-bold tracking-widest mb-8 italic">SELECT ASSETS_</h2>
                
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4" id="item-grid">
                    </div>

                <button onclick="initCheckout()" class="w-full mt-10 py-5 btn-protocol rounded-2xl text-black font-black font-cyber text-xs tracking-[0.3em] uppercase transition-all">
                    Initialize Protocol
                </button>
            </div>
        </div>
    </main>

    <div id="payModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[100] hidden items-center justify-center p-4">
        <div class="glass-card w-full max-w-md rounded-[2.5rem] p-10 border border-white/10 relative shadow-2xl">
            <div class="text-center mb-8">
                <div id="inv-code" class="text-[9px] text-sky-500 font-cyber mb-4 tracking-widest">ORDER_ID: UNKNOWN</div>
                <h3 id="inv-total" class="text-5xl font-cyber font-bold text-white tracking-tighter">Rp 0</h3>
                <p class="text-[9px] text-slate-500 mt-2 tracking-widest font-bold">TOTAL PAYABLE (INC. TAX)</p>
            </div>

            <div class="space-y-3 mb-8 text-xs bg-white/5 p-6 rounded-2xl">
                <div class="flex justify-between"><span class="text-slate-500 italic">Diamond:</span><span id="inv-item" class="text-white font-bold"></span></div>
                <div class="flex justify-between"><span class="text-slate-500 italic">Base:</span><span id="inv-base" class="text-white"></span></div>
                <div class="flex justify-between text-purple-400 font-bold"><span>PPN (11%):</span><span id="inv-tax"></span></div>
                <div class="pt-2 border-t border-white/10 flex justify-between"><span class="text-sky-400">Target:</span><span id="inv-uid" class="text-sky-400 font-bold"></span></div>
            </div>

            <div class="bg-blue-600 rounded-2xl p-5 mb-8 flex justify-between items-center group">
                <div>
                    <p class="text-[8px] text-white/70 font-bold uppercase mb-1">Payment Method: DANA</p>
                    <p class="text-xl font-cyber font-bold text-white tracking-widest">083112056537</p>
                    <p class="text-[9px] text-white/90 font-bold uppercase">A/N: SYA***</p>
                </div>
                <button onclick="copyDana()" class="p-3 bg-white/10 rounded-xl hover:bg-white hover:text-blue-600 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>
                </button>
            </div>

            <button onclick="finalizeTransaction()" class="w-full py-4 bg-white text-black font-black font-cyber rounded-xl text-[10px] tracking-widest hover:bg-sky-400 transition-all uppercase">Confirm Order</button>
            <button onclick="closeModal()" class="w-full mt-4 text-[9px] text-slate-500 font-bold uppercase tracking-widest hover:text-red-500">Cancel Protocol</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const WA_ADMIN = "6283822691748";
        const DANA_NUM = "083112056537";
        const PPN_RATE = 0.11;

        // BANYAK OPSI DIAMOND
        const products = [
            { name: "5 Diamonds", base: 1800 },
            { name: "12 Diamonds", base: 3600 },
            { name: "19 Diamonds", base: 5400 },
            { name: "28 Diamonds", base: 8100 },
            { name: "44 Diamonds", base: 12600 },
            { name: "59 Diamonds", base: 16200 },
            { name: "85 Diamonds", base: 22500 },
            { name: "170 Diamonds", base: 44100 },
            { name: "250 Diamonds", base: 65000 },
            { name: "296 Diamonds", base: 76500 },
            { name: "408 Diamonds", base: 106300 },
            { name: "514 Diamonds", base: 130000 },
            { name: "568 Diamonds", base: 144100 },
            { name: "706 Diamonds", base: 181000 },
            { name: "875 Diamonds", base: 220700 },
            { name: "1050 Diamonds", base: 265000 },
            { name: "2195 Diamonds", base: 540000 },
            { name: "3688 Diamonds", base: 890000 },
            { name: "5532 Diamonds", base: 1350000 },
            { name: "Weekly Pass", base: 27000, type: 'wdp' },
        ];

        let selected = null;
        function formatIDR(n) { return "Rp " + Math.round(n).toLocaleString('id-ID'); }

        const grid = document.getElementById('item-grid');
        products.forEach(p => {
            const div = document.createElement('div');
            div.className = "p-4 glass-card product-card rounded-2xl text-center";
            div.innerHTML = `
                <div class="text-[11px] font-black ${p.type === 'wdp' ? 'text-yellow-400' : 'text-sky-400'} font-cyber uppercase">${p.name}</div>
                <div class="text-[9px] text-white/30 font-bold mt-1">${formatIDR(p.base)}</div>
            `;
            div.onclick = () => {
                document.querySelectorAll('.product-card').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                selected = p;
            };
            grid.appendChild(div);
        });

        function initCheckout() {
            const uid = document.getElementById('user_id').value;
            const zid = document.getElementById('zone_id').value;
            if(!uid || !zid || !selected) return alert("SISTEM: DATA TIDAK LENGKAP!");
            
            const tax = selected.base * PPN_RATE;
            const total = selected.base + tax;
            const invCode = "MS-" + Math.random().toString(36).substr(2, 5).toUpperCase();

            document.getElementById('inv-code').innerText = "ORDER_ID: " + invCode;
            document.getElementById('inv-uid').innerText = uid + " (" + zid + ")";
            document.getElementById('inv-item').innerText = selected.name;
            document.getElementById('inv-base').innerText = formatIDR(selected.base);
            document.getElementById('inv-tax').innerText = "+ " + formatIDR(tax);
            document.getElementById('inv-total').innerText = formatIDR(total);
            
            document.getElementById('payModal').style.display = 'flex';
        }

        function finalizeTransaction() {
            const total = document.getElementById('inv-total').innerText;
            const msg = `*ORDER PROTOCOL: MIRAN STOREML*\n*ID:* ${document.getElementById('inv-uid').innerText}\n*PRODUK:* ${selected.name}\n*TOTAL:* ${total}\n\n*STATUS: TRANSFER DANA SELESAI*`;
            window.location.href = `https://wa.me/${WA_ADMIN}?text=${encodeURIComponent(msg)}`;
        }

        function copyDana() { navigator.clipboard.writeText(DANA_NUM); alert("NOMOR DANA DISALIN"); }
        function closeModal() { document.getElementById('payModal').style.display = 'none'; }

        particlesJS("particles-js", {
            particles: {
                number: { value: 40 },
                color: { value: "#0ea5e9" },
                opacity: { value: 0.1 },
                size: { value: 1.5 },
                line_linked: { enable: true, distance: 150, color: "#0ea5e9", opacity: 0.05, width: 1 },
                move: { enable: true, speed: 0.8 }
            }
        });
    </script>
</body>
</html>
